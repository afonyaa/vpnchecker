<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPN Checker — доступна ли Instagram?</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #1a1d24;
      --text: #e7e9ee;
      --muted: #9aa0ac;
      --ok: #34d399;
      --bad: #f87171;
      --warn: #fbbf24;
      --accent: #6366f1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 4px;
    }

    .ip {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border: 1px solid #262a33;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
    }

    .ip-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .ip-value {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      flex: 1;
    }

    .ip-country {
      font-size: 13px;
    }

    .ip-error {
      color: var(--bad);
      font-size: 12px;
      flex-basis: 100%;
      line-height: 1.4;
    }

    .ip-warn {
      color: var(--bad);
      font-size: 11px;
      flex-basis: 100%;
      line-height: 1.4;
    }

    .ip.ok {
      border-color: var(--ok);
    }

    .ip.bad {
      border-color: var(--bad);
    }

    .checks {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1px solid #262a33;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
    }

    .check .name {
      flex: 1;
    }

    .check .tag {
      color: var(--muted);
      font-size: 12px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3a3f4a;
      flex-shrink: 0;
    }

    .dot.ok {
      background: var(--ok);
    }

    .dot.bad {
      background: var(--bad);
    }

    .dot.pending {
      background: var(--warn);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .status {
      color: var(--muted);
      font-size: 13px;
    }

    footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>Доступность ресурсов</h1>
    <div class="ip" id="ip"></div>
    <div class="checks" id="checks"></div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>

</html>
